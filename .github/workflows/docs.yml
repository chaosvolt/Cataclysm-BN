name: Publish on GitHub Pages

on:
  push:
    branches: [main]
    paths: [docs/**]
  workflow_run:
    workflows: ["Experimental Release"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

defaults:
  run:
    working-directory: docs

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docs

      - name: Download documentation artifacts from experimental release
        working-directory: .
        id: download-docs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            run_id="${{ github.event.workflow_run.id }}"
          else
            run_id=$(gh run list \
              --workflow=experimental-release.yml \
              --branch=main \
              --status=success \
              --limit=20 \
              --json databaseId \
              --jq '.[0].databaseId')
          fi

          if [ -z "$run_id" ]; then
            echo "::warning::No successful experimental release run found for branch main, skipping generated docs"
            echo "downloaded=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if gh run download "$run_id" --name lua-docs --dir .; then
            echo "downloaded=true" >> $GITHUB_OUTPUT
            echo "run_id=$run_id" >> $GITHUB_OUTPUT
          else
            echo "::warning::Failed to download generated docs artifact, continuing without it"
            echo "downloaded=false" >> $GITHUB_OUTPUT
          fi

      - name: Summary of documentation artifact download
        working-directory: .
        if: steps.download-docs.outputs.downloaded == 'true'
        run: |
          echo "## 📥 Documentation Artifact Downloaded" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "From [run #${{ steps.download-docs.outputs.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ steps.download-docs.outputs.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f docs/en/dev/reference/cli_options.md ]; then
            echo "- \`docs/en/dev/reference/cli_options.md\`: $(wc -l < docs/en/dev/reference/cli_options.md) lines" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f docs/en/mod/lua/reference/lua.md ]; then
            echo "- \`docs/en/mod/lua/reference/lua.md\`: $(wc -l < docs/en/mod/lua/reference/lua.md) lines" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f lua_annotations.lua ]; then
            echo "- \`lua_annotations.lua\`: $(wc -l < lua_annotations.lua) lines" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Setup Deno environment
        uses: denoland/setup-deno@v2
        with: { cache: true }

      - name: Build site
        run: deno task build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # https://github.com/actions/upload-pages-artifact/issues/74
          path: "docs/_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
