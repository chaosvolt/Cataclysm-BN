name: "Nightly Release"
concurrency: release
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Nightly date to build, in UTC YYYY-MM-DD. Defaults to today."
        required: false
        type: string

env:
  VCPKG_BINARY_SOURCES: "default"
  EXPECTED_NIGHTLY_ASSET_COUNT: 13

jobs:
  metadata:
    runs-on: ubuntu-slim
    outputs:
      count: ${{ steps.env_vars.outputs.count }}
      tag_name: ${{ steps.env_vars.outputs.tag_name }}
      previous_tag_name: ${{ steps.env_vars.outputs.previous_tag_name }}
      source_sha: ${{ steps.env_vars.outputs.source_sha }}
    steps:
      - uses: actions/checkout@v4
      - id: env_vars
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUESTED_DATE: ${{ inputs.date || '' }}
        run: |
          TAG_NAME=${REQUESTED_DATE:-$(date -u --iso-8601)}
          if ! [[ "$TAG_NAME" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]] || [ "$(date -u --date="$TAG_NAME" +%F)" != "$TAG_NAME" ]; then
            echo "::error::date must be a valid UTC date in YYYY-MM-DD format"
            exit 1
          fi

          PREVIOUS_TAG_NAME=$(
            git ls-remote --tags --refs origin "refs/tags/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]" \
              | awk '{ sub("refs/tags/", "", $2); print $2 }' \
              | awk -v tag="$TAG_NAME" '$0 < tag' \
              | sort \
              | tail -n 1
          )
          if [ -z "$PREVIOUS_TAG_NAME" ]; then
            echo "::error::no previous nightly tag found before $TAG_NAME"
            exit 1
          fi

          SOURCE_SHA=$(git ls-remote --tags origin "refs/tags/$TAG_NAME" | awk '{ print $1 }')
          SOURCE_SHA=${SOURCE_SHA:-$GITHUB_SHA}
          COMMITS=$(gh api "repos/${GITHUB_REPOSITORY}/compare/${PREVIOUS_TAG_NAME}...${SOURCE_SHA}" --jq .total_commits)

          echo "commits since $PREVIOUS_TAG_NAME: $COMMITS" >> "$GITHUB_STEP_SUMMARY"
          echo "source commit: $SOURCE_SHA" >> "$GITHUB_STEP_SUMMARY"

          echo "count=$COMMITS" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "previous_tag_name=$PREVIOUS_TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"

  release:
    needs: metadata
    name: Create Release
    runs-on: ubuntu-slim

    if: github.event_name == 'workflow_dispatch' || fromJson(needs.metadata.outputs.count) > 0
    outputs:
      upload_assets: ${{ steps.asset_check.outputs.upload_assets }}

    steps:
      - name: Check release state
        id: release_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ needs.metadata.outputs.tag_name }}" --json tagName --jq .tagName > /dev/null 2>&1; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: denoland/setup-deno@v2
        with: { cache: true }

      - name: Build changelog
        if: ${{ steps.release_check.outputs.release_exists == 'false' }}
        id: build_changelog
        run: |
          changelog_file="$RUNNER_TEMP/changelog.md"
          deno run -A scripts/changelog/main.ts \
            --range "${{ needs.metadata.outputs.previous_tag_name }}..${{ needs.metadata.outputs.source_sha }}" \
            --output "$changelog_file" \
            --quiet
          echo "path=$changelog_file" >> "$GITHUB_OUTPUT"

      - name: Create release
        if: ${{ steps.release_check.outputs.release_exists == 'false' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_body="$RUNNER_TEMP/release-body.md"
          cat "${{ steps.build_changelog.outputs.path }}" > "$release_body"
          echo >> "$release_body"
          echo "These are the outputs for the build of commit [${{ needs.metadata.outputs.source_sha }}](https://github.com/${{ github.repository }}/commit/${{ needs.metadata.outputs.source_sha }})" >> "$release_body"

          gh release create "${{ needs.metadata.outputs.tag_name }}" \
            --title "Nightly ${{ needs.metadata.outputs.tag_name }}" \
            --notes-file "$release_body" \
            --prerelease \
            --target "${{ needs.metadata.outputs.source_sha }}"

      - name: Check release assets
        id: asset_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          asset_count=$(gh release view "${{ needs.metadata.outputs.tag_name }}" --json assets --jq '.assets | length' 2>/dev/null || echo 0)
          echo "asset_count=$asset_count" >> "$GITHUB_STEP_SUMMARY"
          echo "asset_count=$asset_count" >> "$GITHUB_OUTPUT"

          if [ "$asset_count" -lt "$EXPECTED_NIGHTLY_ASSET_COUNT" ]; then
            echo "upload_assets=true" >> "$GITHUB_OUTPUT"
          else
            echo "upload_assets=false" >> "$GITHUB_OUTPUT"
          fi

  build-translations:
    needs: [metadata, release]
    if: ${{ needs.release.outputs.upload_assets == 'true' }}
    uses: ./.github/workflows/build-translations.yml
    with:
      checkout-ref: ${{ needs.metadata.outputs.tag_name }}
    secrets:
      TX_TOKEN: ${{ secrets.TX_TOKEN }}

  builds:
    needs: [metadata, release, build-translations]
    if: ${{ needs.release.outputs.upload_assets == 'true' }}
    uses: ./.github/workflows/build.yml
    with:
      version-label: ${{ needs.metadata.outputs.tag_name }}
      checkout-ref: ${{ needs.metadata.outputs.tag_name }}
      upload-to-release: true
      release-tag: ${{ needs.metadata.outputs.tag_name }}
    secrets: inherit
