# Reusable workflow for building multiple platform/configuration combinations
name: "Build Matrix Workflow"

on:
  workflow_call:
    inputs:
      version-label:
        description: "Version label for all builds"
        required: true
        type: string
      mode:
        description: "Build mode: release or ci"
        required: false
        type: string
        default: release
      artifact-label:
        description: "Suffix for uploaded workflow artifact names"
        required: false
        type: string
        default: ""
      checkout-ref:
        description: "Git ref or SHA to build"
        required: false
        type: string
        default: ""
      matrix-json:
        description: "Build matrix include entries as JSON"
        required: false
        type: string
        default: |
          [
            { "name": "Windows MSVC", "platform": "windows", "artifact": "windows-tiles-x64-msvc", "os": "windows-2022", "arch": "x64", "tiles": true, "sound": true, "ext": "zip", "content-type": "application/zip" },
            { "name": "Linux Tiles", "platform": "linux", "artifact": "linux-tiles-x64", "os": "ubuntu-latest", "tiles": true, "sound": true, "ext": "tar.gz", "content-type": "application/gzip" },
            { "name": "Linux Curses", "platform": "linux", "artifact": "linux-curses-x64", "os": "ubuntu-latest", "tiles": false, "sound": false, "ext": "tar.gz", "content-type": "application/gzip" },
            { "name": "macOS Curses", "platform": "macos", "artifact": "osx-curses-x64", "os": "macos-15-intel", "preset": "osx-curses-x64-dist", "tiles": false, "sound": false, "ext": "dmg", "content-type": "application/x-apple-diskimage" },
            { "name": "macOS Tiles", "platform": "macos", "artifact": "osx-tiles-x64", "os": "macos-15-intel", "preset": "osx-tiles-x64-dist", "tiles": true, "sound": true, "ext": "dmg", "content-type": "application/x-apple-diskimage" },
            { "name": "macOS Curses ARM", "platform": "macos", "artifact": "osx-curses-arm", "os": "macos-15", "preset": "osx-curses-arm-dist", "tiles": false, "sound": false, "ext": "dmg", "content-type": "application/x-apple-diskimage" },
            { "name": "macOS Tiles ARM", "platform": "macos", "artifact": "osx-tiles-arm", "os": "macos-15", "preset": "osx-tiles-arm-dist", "tiles": true, "sound": true, "ext": "dmg", "content-type": "application/x-apple-diskimage" },
            { "name": "Android ARM64", "platform": "android", "artifact": "android-x64", "os": "ubuntu-latest", "android": "arm64", "tiles": true, "ext": "apk", "content-type": "application/apk" },
            { "name": "Android Bundle", "platform": "android", "artifact": "android-bundle", "os": "ubuntu-latest", "android": "bundle", "tiles": true, "ext": "aab", "content-type": "application/aab" }
          ]
      download-translations:
        description: "Download prebuilt translation artifact"
        required: false
        type: boolean
        default: true
      bundle-tilesets:
        description: "Bundle external tilesets into tiles builds"
        required: false
        type: boolean
        default: true
      bundle-registry-mods:
        description: "Bundle registry mods and soundpacks into release archives"
        required: false
        type: boolean
        default: true
      package-artifacts:
        description: "Create release archives where separate packaging is needed"
        required: false
        type: boolean
        default: true
      run-tests:
        description: "Build and run tests when supported by the selected platform"
        required: false
        type: boolean
        default: false
      android-localize:
        description: "Build Android assets with localization"
        required: false
        type: boolean
        default: true
      upload-to-release:
        description: "Upload to GitHub release"
        required: false
        type: boolean
        default: false
      upload-artifacts:
        description: "Upload packaged build files as workflow artifacts"
        required: false
        type: boolean
        default: false
      release-tag:
        description: "Release tag to upload to (empty for experimental)"
        required: false
        type: string
        default: ""
    secrets:
      KEYSTORE:
        required: false
      KEYSTORE_PASSWORD:
        required: false
      KEYSTORE_PROPERTIES:
        required: false

# Keep release-compatible defaults here. CI callers can replace the matrix with inputs.matrix-json.
env:
  ZSTD_CLEVEL: 17
  VCPKG_BINARY_SOURCES: "default"
  EMMYLUA_CHECK_VERSION: "0.22.0"
  LLVM_VERSION: "22"

jobs:
  shader-artifacts:
    name: Generate shader artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout-ref }}

      - name: Install shadercross dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf autoconf-archive automake libtool libltdl-dev

      - name: Install shadercross
        run: bash build-scripts/install-shadercross-vcpkg.sh

      - name: Generate shaders
        run: bash build-scripts/generate-shaders.sh

      - name: Upload generated shaders
        uses: actions/upload-artifact@v4
        with:
          name: generated-shaders
          path: data/shaders/
          if-no-files-found: error

  builds:
    needs: shader-artifacts
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.matrix-json) }}

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout-ref }}

      - name: Download generated shaders
        uses: actions/download-artifact@v4
        with:
          name: generated-shaders
          path: data/shaders

      - name: Download translation artifacts
        if: inputs.download-translations
        uses: actions/download-artifact@v4
        with:
          name: translations
          path: .

      - uses: denoland/setup-deno@v2
        with: { cache: true }

      - name: Create VERSION.TXT
        shell: bash
        run: |
          cat >VERSION.txt <<EOL
          build type: ${{ matrix.artifact }}
          build number: ${{ inputs.version-label }}
          commit sha: ${{ github.sha }}
          commit url: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
          EOL

      - name: Bundle registry mods
        if: inputs.bundle-registry-mods
        run: deno run --allow-read --allow-write --allow-net build-scripts/bundle-registry-mods.ts ${{ format('{0}', matrix.sound) == 'false' && '--exclude-package-type soundpack' || '' }}

      - name: Bundle CDDA tilesets
        if: matrix.tiles == true && inputs.bundle-tilesets
        env:
          GH_TOKEN: ${{ github.token }}
          CDDA_TILESETS_REPO: I-am-Erk/CDDA-Tilesets
          CDDA_TILESETS_RELEASE: "2026-05-03"
          CDDA_TILESETS: UltimateCataclysm ChibiUltica
        shell: bash
        run: |
          set -euo pipefail
          download_dir="$RUNNER_TEMP/cdda-tilesets"
          rm -rf "$download_dir"
          mkdir -p "$download_dir"

          for tileset in $CDDA_TILESETS; do
            gh release download "$CDDA_TILESETS_RELEASE" \
              --repo "$CDDA_TILESETS_REPO" \
              --pattern "$tileset.zip" \
              --dir "$download_dir" \
              --clobber
            rm -rf "gfx/$tileset"
            unzip -q "$download_dir/$tileset.zip" -d gfx
          done

          cat >gfx/CDDA-Tilesets-2026-05-03-CREDITS.txt <<'EOF'
          Bundled CDDA-Tilesets release assets
          ====================================

          Source repository: https://github.com/I-am-Erk/CDDA-Tilesets
          Source release: https://github.com/I-am-Erk/CDDA-Tilesets/releases/tag/2026-05-03
          Bundled assets: UltimateCataclysm.zip, ChibiUltica.zip

          The CDDA-Tilesets repository states that Cataclysm: Dark Days Ahead and
          the Ultimate Cataclysm tileset are volunteer contributions under the
          Creative Commons Attribution-ShareAlike 3.0 Unported License:
          http://creativecommons.org/licenses/by-sa/3.0/

          Per the tileset metadata, further sprite credits are maintained in the
          source repository under gfx/UltimateCataclysm and gfx.  ChibiUltica also
          includes Dungeon Crawl: Stone Soup sprites under CC0; see its tileset.txt
          for that notice.
          EOF

      # Windows MSVC setup
      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup msys2 (windows msvc)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          install: gettext

      - name: Compile translations (windows msvc)
        if: runner.os == 'Windows' && inputs.download-translations
        shell: msys2 {0}
        run: lang/compile_mo.sh all

      - name: Install stable CMake
        if: runner.os == 'Windows'
        uses: lukka/get-cmake@v3.31.6

      - name: Export GitHub Actions cache environment variables
        if: runner.os == 'Windows'
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable("ACTIONS_CACHE_URL", process.env.ACTIONS_CACHE_URL || "")
            core.exportVariable("ACTIONS_RESULTS_URL", process.env.ACTIONS_RESULTS_URL || "")
            core.exportVariable("ACTIONS_RUNTIME_TOKEN", process.env.ACTIONS_RUNTIME_TOKEN || "")

      - name: Configure vcpkg binary cache (windows msvc)
        if: runner.os == 'Windows'
        run: |
          $mode = "readwrite"
          if ("${{ github.event_name }}" -eq "pull_request") {
            $mode = "read"
          }
          "VCPKG_BINARY_SOURCES=clear;x-gha,$mode" >> $env:GITHUB_ENV

      - name: Install vcpkg
        if: runner.os == 'Windows'
        uses: lukka/run-vcpkg@main
        id: runvcpkg
        with:
          vcpkgDirectory: "${{ github.workspace }}/../b/vcpkg"

      - name: Integrate vcpkg
        if: runner.os == 'Windows'
        run: vcpkg integrate install

      - name: Setup ccache (Windows)
        if: runner.os == 'Windows'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          # Build mode changes MSVC compiler inputs.
          key: windows-${{ matrix.artifact }}-${{ inputs.mode }}-${{ github.ref_name }}
          restore-keys: |
            windows-${{ matrix.artifact }}-${{ inputs.mode }}-${{ github.ref_name }}
            windows-${{ matrix.artifact }}-${{ inputs.mode }}-main
            windows-${{ matrix.artifact }}-${{ inputs.mode }}-
          max-size: 3G
          verbose: 2
          save: ${{ github.event_name != 'pull_request' }}

      - name: Configure ccache for MSVC
        if: runner.os == 'Windows'
        run: |
          echo "CCACHE_BASEDIR=${{ github.workspace }}" >> $env:GITHUB_ENV
          echo "CCACHE_SLOPPINESS=include_file_ctime,include_file_mtime,time_macros,pch_defines" >> $env:GITHUB_ENV
          echo "CCACHE_NOHASHDIR=1" >> $env:GITHUB_ENV
          echo "CCACHE_COMPILERCHECK=content" >> $env:GITHUB_ENV

      # Linux setup
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux' && (matrix.android == '' || matrix.android == 'none')
        run: |
          sudo apt-get update
          sudo apt-get install libncursesw5-dev \
            libpulse-dev mold gettext parallel libsqlite3-dev zlib1g-dev libvulkan-dev mesa-vulkan-drivers xvfb \
            autoconf autoconf-archive automake libtool libltdl-dev

      - name: Setup LLVM build tools (Linux)
        if: runner.os == 'Linux' && (matrix.android == '' || matrix.android == 'none')
        uses: aminya/setup-cpp@v1
        with:
          compiler: llvm-${{ env.LLVM_VERSION }}
          cmake: true
          ninja: true
          setup-cpp: false

      - name: Show Clang version (Linux)
        if: runner.os == 'Linux' && (matrix.android == '' || matrix.android == 'none')
        run: clang++ --version

      #- name: Install SDL3 (Linux)
      #  if: runner.os == 'Linux' && (matrix.android == '' || matrix.android == 'none')
      #  run: |
      #    sudo apt-get install --ignore-missing libsdl3-dev libsdl3-ttf-dev libsdl3-image-dev libsdl3-mixer-dev

      - name: Install SDL3-devel Dependencies (Linux)
        if: runner.os == 'Linux' && (matrix.android == '' || matrix.android == 'none')
        run: |
          sudo apt-get install libasound2-dev libpulse-dev libaudio-dev libjack-dev libsndio-dev libx11-dev \
            libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev libxkbcommon-dev \
            libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev libdbus-1-dev \
            libibus-1.0-dev libudev-dev libpipewire-0.3-dev libwayland-dev libdecor-0-dev liburing-dev \
            libfreetype-dev libharfbuzz-dev \
            libtiff-dev libavif-dev libwebp-dev libjpeg-dev libjxl-dev \
            libflac-dev libvorbis-dev libxmp-dev libmpg123-dev libwavpack-dev

      - name: Setup ccache (Linux)
        if: runner.os == 'Linux' && (matrix.android == '' || matrix.android == 'none')
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.artifact }}-${{ github.ref_name }}
          restore-keys: |
            ${{ matrix.artifact }}-${{ github.ref_name }}
            ${{ matrix.artifact }}-main
            ${{ matrix.artifact }}-
          max-size: 500M
          verbose: 2
          save: ${{ github.event_name != 'pull_request' }}

      # macOS setup
      - name: Install build dependencies (mac)
        if: runner.os == 'macOS'
        run: |
          HOMEBREW_NO_AUTO_UPDATE=yes HOMEBREW_NO_INSTALL_CLEANUP=yes brew install sdl3 sdl3_image sdl3_ttf sdl3_mixer gettext parallel astyle sqlite3 zlib ncurses flac pkg-config dylibbundler
          python3 -m venv ./venv
          source ./venv/bin/activate
          pip3 install mac_alias==2.2.0 dmgbuild==1.6.1 biplist polib luaparser
          echo "CMAKE_PREFIX_PATH=$(brew --prefix ncurses):$(brew --prefix flac)" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$(brew --prefix flac)/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "$PWD/venv/bin" >> "$GITHUB_PATH"

      - name: Setup C++ build tools (mac)
        if: runner.os == 'macOS'
        uses: aminya/setup-cpp@v1
        with:
          compiler: apple-clang
          cmake: true
          ninja: true
          setup-cpp: false

      - name: Setup ccache (mac)
        if: runner.os == 'macOS'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.artifact }}-${{ github.ref_name }}
          restore-keys: |
            ${{ matrix.artifact }}-${{ github.ref_name }}
            ${{ matrix.artifact }}-main
            ${{ matrix.artifact }}-
          max-size: 500M
          verbose: 2
          save: ${{ github.event_name != 'pull_request' }}

      - name: Install shadercross (Linux)
        if: runner.os == 'Linux' && (matrix.android == '' || matrix.android == 'none') && matrix.tiles == true
        run: bash build-scripts/install-shadercross-vcpkg.sh

      # Build with CMake (Linux)
      - name: Configure and Build with CMake (Linux)
        if: runner.os == 'Linux' && (matrix.android == '' || matrix.android == 'none')
        uses: lukka/run-cmake@v10
        with:
          configurePreset: ${{ matrix.tiles && 'dist-tiles' || 'dist-curses' }}
          configurePresetAdditionalArgs: ${{ inputs.run-tests && '["-DCATA_FORMAT_TARGETS=OFF", "-DTESTS=ON"]' || '["-DCATA_FORMAT_TARGETS=OFF"]' }}
          buildPreset: ${{ matrix.tiles && 'dist-tiles' || 'dist-curses' }}

      - name: Setup EmmyLua checker
        if: runner.os == 'Linux' && matrix.artifact == 'linux-tiles-x64'
        uses: scarf005/emmylua_check_action@v1.0.3
        with:
          version: ${{ env.EMMYLUA_CHECK_VERSION }}
          token: ${{ github.token }}

      - name: Generate Lua reference/annotations for typecheck
        if: runner.os == 'Linux' && matrix.artifact == 'linux-tiles-x64'
        env:
          CATA_EXE: ./cataclysm-bn-tiles
        run: |
          ln -sf build/src/cataclysm-bn-tiles ./cataclysm-bn-tiles
          deno task docs:gen

      - name: Run EmmyLua check
        if: runner.os == 'Linux' && matrix.artifact == 'linux-tiles-x64'
        run: emmylua_check .

      - name: Generate documentation artifacts
        if: runner.os == 'Linux' && matrix.artifact == 'linux-tiles-x64' && inputs.version-label == 'experimental'
        env:
          CATA_EXE: ./cataclysm-bn-tiles
        run: |
          ln -sf build/src/cataclysm-bn-tiles ./cataclysm-bn-tiles
          deno task docs:gen

      - name: Upload documentation artifact
        if: runner.os == 'Linux' && matrix.artifact == 'linux-tiles-x64' && inputs.version-label == 'experimental'
        uses: actions/upload-artifact@v4
        with:
          name: lua-docs
          if-no-files-found: error
          path: |
            docs/en/dev/reference/cli_options.md
            docs/en/mod/lua/reference/lua.md
            lua_annotations.lua

      - name: Summary of documentation artifact
        if: runner.os == 'Linux' && matrix.artifact == 'linux-tiles-x64' && inputs.version-label == 'experimental'
        run: |
          echo "## 📦 Documentation Artifact Uploaded" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- \`docs/en/dev/reference/cli_options.md\`: $(wc -l < docs/en/dev/reference/cli_options.md) lines" >> $GITHUB_STEP_SUMMARY
          echo "- \`docs/en/mod/lua/reference/lua.md\`: $(wc -l < docs/en/mod/lua/reference/lua.md) lines" >> $GITHUB_STEP_SUMMARY
          echo "- \`lua_annotations.lua\`: $(wc -l < lua_annotations.lua) lines" >> $GITHUB_STEP_SUMMARY

      - name: Create distribution package (Linux)
        if: runner.os == 'Linux' && (matrix.android == '' || matrix.android == 'none') && inputs.package-artifacts && (!inputs.upload-artifacts || matrix.upload-artifact == true)
        run: |
          mkdir -p lang/mo
          cmake --install build --prefix cataclysmbn-${{ inputs.version-label }}
          tar -czvf cbn-${{ matrix.artifact }}-${{ inputs.version-label }}.tar.gz \
            cataclysmbn-${{ inputs.version-label }}

      - name: Verify bundled SDL runtime (Linux)
        if: runner.os == 'Linux' && (matrix.android == '' || matrix.android == 'none') && inputs.package-artifacts && (!inputs.upload-artifacts || matrix.upload-artifact == true)
        run: |
          set -euo pipefail
          dist="cataclysmbn-${{ inputs.version-label }}"
          exe="$dist/cataclysm-bn"
          if [ "${{ matrix.tiles }}" = "true" ]; then
            exe="$dist/cataclysm-bn-tiles"
          fi

          test -x "$exe"
          find "$dist/lib" -maxdepth 1 -name 'libSDL3*.so*' | grep .
          if [ "${{ matrix.tiles }}" = "true" ]; then
            find "$dist/lib" -maxdepth 1 -name 'libSDL3_image*.so*' | grep .
            find "$dist/lib" -maxdepth 1 -name 'libSDL3_ttf*.so*' | grep .
          fi
          if [ "${{ matrix.sound }}" = "true" ]; then
            find "$dist/lib" -maxdepth 1 -name 'libSDL3_mixer*.so*' | grep .
          fi

          ldd "$exe" | tee bundled-deps.txt
          if grep -E 'SDL3.*not found' bundled-deps.txt; then
            exit 1
          fi
          if ! grep -E "libSDL3.*$dist/lib" bundled-deps.txt; then
            echo "SDL3 is not resolved from the bundled lib directory" >&2
            exit 1
          fi
          "$exe" --version

      - name: Configure CBN (windows msvc)
        if: runner.os == 'Windows'
        env:
          VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}\.github\vcpkg_triplets
        run: |
          $buildType = "Release"
          $localize = "False"
          $tests = "False"
          $release = "ON"
          if ("${{ inputs.download-translations }}" -eq "true") {
            $localize = "True"
          }
          if ("${{ inputs.mode }}" -eq "ci") {
            $buildType = "RelWithDebInfo"
            $release = "OFF"
          }
          if ("${{ inputs.run-tests }}" -eq "true") {
            $tests = "True"
          }
          cmake -G Ninja `
            -S "${{ github.workspace }}" `
            -B "${{ github.workspace }}/out/build/windows-tiles-sounds-x64-msvc" `
            "-DCMAKE_BUILD_TYPE=$buildType" `
            -DCMAKE_PROJECT_INCLUDE_BEFORE="${{ github.workspace }}/build-scripts/windows-tiles-sounds-x64-msvc.cmake" `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/build-scripts/MSVC.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DDYNAMIC_LINKING=False `
            -DCURSES=False `
            "-DLOCALIZE=$localize" `
            -DTILES=True `
            -DSOUND=True `
            "-DTESTS=$tests" `
            "-DRELEASE=$release" `
            -DJSON_FORMAT=OFF `
            -DCATA_FORMAT_TARGETS=OFF `
            -DCMAKE_INSTALL_MESSAGE=NEVER

      - name: Build CBN (windows msvc)
        if: runner.os == 'Windows'
        run: |
          $targets = @("cataclysm-bn-tiles")
          if ("${{ inputs.run-tests }}" -eq "true") {
            $targets += "cata_test-tiles"
          }
          cmake --build "${{ github.workspace }}/out/build/windows-tiles-sounds-x64-msvc" `
            --config Release `
            --target $targets

      - name: Verify ccache compatibility (windows msvc)
        if: runner.os == 'Windows'
        run: |
          $stats = ccache -s -vv 2>&1
          $stats
          $cacheable = [int64](($stats | Select-String 'Cacheable calls:\s+(\d+)').Matches[0].Groups[1].Value)
          $unsupported = [int64](($stats | Select-String 'Unsupported compiler option:\s+(\d+)').Matches[0].Groups[1].Value)
          if ($cacheable -le 100) {
            throw "ccache did not see enough cacheable MSVC compile calls"
          }
          if ($unsupported -ge $cacheable) {
            throw "ccache saw more unsupported MSVC compiler options than cacheable calls"
          }

      - name: Create distribution package (windows msvc)
        if: runner.os == 'Windows' && inputs.package-artifacts && (!inputs.upload-artifacts || matrix.upload-artifact == true)
        run: |
          $dist = "cataclysmbn-${{ inputs.version-label }}"
          New-Item -ItemType Directory -Force lang/mo
          cmake --install out/build/windows-tiles-sounds-x64-msvc --prefix $dist --config Release

          Compress-Archive -Force -Path $dist/* -DestinationPath cbn-${{ matrix.artifact }}-${{ inputs.version-label }}.zip

      - name: Verify statically linked SDL runtime (windows msvc)
        if: runner.os == 'Windows' && inputs.package-artifacts && (!inputs.upload-artifacts || matrix.upload-artifact == true)
        run: |
          $dist = "cataclysmbn-${{ inputs.version-label }}"
          $exe = Join-Path $dist "cataclysm-bn-tiles.exe"
          if (!(Test-Path $exe)) {
            throw "Missing Windows release executable: $exe"
          }
          $deps = dumpbin /DEPENDENTS $exe
          $deps
          if ($deps -match "SDL3") {
            throw "Windows release executable should use the static SDL build, but dumpbin found an SDL DLL dependency"
          }
          & $exe --version

      - name: Locate PDB (windows msvc)
        if: runner.os == 'Windows' && inputs.package-artifacts && (!inputs.upload-artifacts || matrix.upload-artifact == true)
        run: Get-ChildItem -Path "${{ github.workspace }}/out/build/windows-tiles-sounds-x64-msvc" -Filter "*.pdb" -Recurse | Select-Object -ExpandProperty FullName

      - name: Archive PDB (windows msvc)
        if: runner.os == 'Windows' && inputs.package-artifacts && (!inputs.upload-artifacts || matrix.upload-artifact == true)
        run: |
          $pdb = "${{ github.workspace }}/out/build/windows-tiles-sounds-x64-msvc/src/cataclysm-bn-tiles.pdb"
          $archive = "cbn-${{ matrix.artifact }}-${{ inputs.version-label }}-pdb.zip"
          if (!(Test-Path $pdb)) {
            throw "Missing Windows release PDB: $pdb"
          }
          Compress-Archive -Force -Path $pdb -DestinationPath $archive
          if (!(Test-Path $archive)) {
            throw "Missing Windows release PDB archive: $archive"
          }

      - name: Configure and Build with CMake (macOS)
        if: runner.os == 'macOS'
        uses: lukka/run-cmake@v10
        with:
          configurePreset: ${{ matrix.preset }}
          configurePresetAdditionalArgs: ${{ inputs.run-tests && '["-DCATA_FORMAT_TARGETS=OFF", "-DTESTS=ON"]' || '["-DCATA_FORMAT_TARGETS=OFF"]' }}
          buildPreset: ${{ matrix.preset }}

      - name: Rename distribution package (macOS)
        if: runner.os == 'macOS' && inputs.package-artifacts && (!inputs.upload-artifacts || matrix.upload-artifact == true)
        run: mv CataclysmBN-*.dmg cbn-${{ matrix.artifact }}-${{ inputs.version-label }}.dmg

      - name: Verify bundled SDL runtime (macOS)
        if: runner.os == 'macOS' && inputs.package-artifacts && (!inputs.upload-artifacts || matrix.upload-artifact == true)
        run: |
          set -euo pipefail
          resources="Cataclysm.app/Contents/Resources"
          exe="$resources/cataclysm-bn"
          if [ "${{ matrix.tiles }}" = "true" ]; then
            exe="$resources/cataclysm-bn-tiles"
          fi

          test -x "$exe"
          find "$resources/lib" -maxdepth 1 -name '*SDL3*.dylib' | grep .
          if [ "${{ matrix.tiles }}" = "true" ]; then
            find "$resources/lib" -maxdepth 1 -name '*SDL3_image*.dylib' | grep .
            find "$resources/lib" -maxdepth 1 -name '*SDL3_ttf*.dylib' | grep .
          fi
          if [ "${{ matrix.sound }}" = "true" ]; then
            find "$resources/lib" -maxdepth 1 -name '*SDL3_mixer*.dylib' | grep .
          fi

          otool -L "$exe" | tee bundled-deps.txt
          if grep -E '/(opt/homebrew|usr/local)/.*SDL3' bundled-deps.txt; then
            echo "SDL3 still resolves through Homebrew instead of the app bundle" >&2
            exit 1
          fi
          "$exe" --version

      # Android builds
      - name: Set up JDK 11 (android)
        if: runner.os == 'Linux' && matrix.android != '' && matrix.android != 'none'
        uses: actions/setup-java@v4.1.0
        with:
          java-version: "11"
          distribution: "adopt"
          cache: gradle
          cache-dependency-path: |
            android/*.gradle.kts
            android/**/*.gradle.kts
            android/gradle.properties
            android/gradle/wrapper/gradle-wrapper.properties

      - name: Setup Build and Dependencies (android)
        if: runner.os == 'Linux' && matrix.android != '' && matrix.android != 'none'
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext autoconf autoconf-archive automake libtool libltdl-dev

      - name: Setup C++ build tools (android host)
        if: runner.os == 'Linux' && matrix.android != '' && matrix.android != 'none'
        uses: aminya/setup-cpp@v1
        with:
          cmake: true
          ninja: true
          setup-cpp: false

      - name: Install shadercross (android host)
        if: runner.os == 'Linux' && matrix.android != '' && matrix.android != 'none'
        run: bash build-scripts/install-shadercross-vcpkg.sh

      - name: Setup ccache (android)
        if: runner.os == 'Linux' && matrix.android != '' && matrix.android != 'none'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.artifact }}-${{ github.ref_name }}
          restore-keys: |
            ${{ matrix.artifact }}-${{ github.ref_name }}
            ${{ matrix.artifact }}-main
            ${{ matrix.artifact }}-
          max-size: 2G
          verbose: 2
          save: ${{ github.event_name != 'pull_request' }}

      - name: Configure ccache (android)
        if: runner.os == 'Linux' && matrix.android != '' && matrix.android != 'none'
        run: |
          echo "CCACHE_BASEDIR=${{ github.workspace }}" >> "$GITHUB_ENV"
          echo "CCACHE_SLOPPINESS=include_file_ctime,include_file_mtime,time_macros,pch_defines" >> "$GITHUB_ENV"
          echo "CCACHE_NOHASHDIR=1" >> "$GITHUB_ENV"
          echo "CCACHE_COMPILERCHECK=content" >> "$GITHUB_ENV"

      - name: Build CBN (android)
        if: runner.os == 'Linux' && matrix.android != '' && matrix.android != 'none'
        working-directory: ./android
        env:
          NDK_CCACHE: ccache
          KEYSTORE: ${{ secrets.KEYSTORE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_PROPERTIES: ${{ secrets.KEYSTORE_PROPERTIES }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            rm -f keystore.properties
            cat > keystore.properties <<'EOF'
          storeFile=pr-debug.keystore
          storePassword=android
          keyAlias=cbn-pr-debug
          keyPassword=android
          EOF
            echo "::notice::Signing PR Android artifact with the committed PR debug key"
          elif [ -n "$KEYSTORE" ] && [ -n "$KEYSTORE_PASSWORD" ] && [ -n "$KEYSTORE_PROPERTIES" ]; then
            printf '%s' "$KEYSTORE" > release.keystore.asc
            gpg -d --passphrase "$KEYSTORE_PASSWORD" --batch release.keystore.asc > app/release.keystore
            printf '%s' "$KEYSTORE_PROPERTIES" > keystore.properties.asc
            gpg -d --passphrase "$KEYSTORE_PASSWORD" --batch keystore.properties.asc > keystore.properties
          else
            echo "::warning::Android signing secrets are unavailable; building unsigned release artifacts"
          fi
          mkdir -p ../lang/mo
          chmod +x gradlew

          # Determine build variant based on version label
          if [ "${{ inputs.version-label }}" = "experimental" ]; then
            VARIANT="Experimental"
            VARIANT_LOWER="experimental"
            export UPSTREAM_BUILD_NUMBER="$((2037 + ${{ github.run_number }}))"
          else
            VARIANT="Stable"
            VARIANT_LOWER="stable"
            VERSION_ARG="-Poverride_version=${{ inputs.version-label }}"
          fi

          gradle_retry() {
            for attempt in 1 2 3; do
              if ./gradlew "$@"; then
                return 0
              fi
              if [ "$attempt" = 3 ]; then
                return 1
              fi
              echo "::warning::Gradle attempt $attempt failed; retrying after 60 seconds"
              sleep 60
            done
          }

          if [ ${{ matrix.android }} = arm64 ]
          then
               gradle_retry -Pj=$(nproc) -Pabi_arm_32=false -Plocalize=${{ inputs.android-localize }} assemble${VARIANT}Release ${VERSION_ARG}
               mv ./app/build/outputs/apk/${VARIANT_LOWER}/release/*.apk ../cbn-${{ matrix.artifact }}-${{ inputs.version-label }}.apk
          elif [ ${{ matrix.android }} = bundle ]
          then
               gradle_retry -Pj=$(nproc) -Plocalize=${{ inputs.android-localize }} bundle${VARIANT}Release ${VERSION_ARG}
               mv ./app/build/outputs/bundle/${VARIANT_LOWER}Release/*.aab ../cbn-${{ matrix.artifact }}-${{ inputs.version-label }}.aab
          fi

      - name: Verify ccache compatibility (android)
        if: runner.os == 'Linux' && matrix.android != '' && matrix.android != 'none'
        run: |
          set -euo pipefail
          stats="$(ccache -s -vv 2>&1)"
          printf '%s\n' "$stats"
          cacheable="$(printf '%s\n' "$stats" | sed -nE 's/.*Cacheable calls:[[:space:]]*([0-9]+).*/\1/p' | head -n 1)"
          hits="$(printf '%s\n' "$stats" | sed -nE 's/.*Hits:[[:space:]]*([0-9]+)[[:space:]]*\/.*/\1/p' | head -n 1)"
          unsupported="$(printf '%s\n' "$stats" | sed -nE 's/.*Unsupported compiler option:[[:space:]]*([0-9]+).*/\1/p' | head -n 1)"
          if [ "${cacheable:-0}" -le 100 ]; then
            echo "ccache did not see enough cacheable Android compile calls" >&2
            exit 1
          fi
          if [ "${unsupported:-0}" -ne 0 ]; then
            echo "ccache saw unsupported Android compiler options" >&2
            exit 1
          fi
          if [ "${hits:-0}" -eq 0 ]; then
            echo "::warning::Android ccache restored no hits; this is expected until a warm cache is saved for the current ccache settings"
          fi

      - name: Verify bundled SDL runtime (android)
        if: runner.os == 'Linux' && matrix.android != '' && matrix.android != 'none'
        run: |
          set -euo pipefail
          artifact="cbn-${{ matrix.artifact }}-${{ inputs.version-label }}.${{ matrix.ext }}"
          test -f "$artifact"
          unzip -l "$artifact" | tee bundled-deps.txt
          grep -E 'libSDL3\.so' bundled-deps.txt
          grep -E 'libSDL3_image\.so' bundled-deps.txt
          grep -E 'libSDL3_mixer\.so' bundled-deps.txt
          grep -E 'libSDL3_ttf\.so' bundled-deps.txt

      - name: Build test executable (desktop)
        if: inputs.run-tests && (runner.os == 'Windows' || runner.os == 'macOS' || (runner.os == 'Linux' && (matrix.android == '' || matrix.android == 'none')))
        shell: pwsh
        run: |
          $buildDir = if ($IsWindows) {
            "${{ github.workspace }}/out/build/windows-tiles-sounds-x64-msvc"
          } else {
            "${{ github.workspace }}/build"
          }
          $target = if ("${{ matrix.tiles }}" -eq "true") { "cata_test-tiles" } else { "cata_test" }
          cmake --build $buildDir --target $target --config Release

      - name: Run tests (desktop)
        if: inputs.run-tests && (runner.os == 'Windows' || (runner.os == 'Linux' && (matrix.android == '' || matrix.android == 'none')))
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $buildDir = if ($IsWindows) {
            "${{ github.workspace }}/out/build/windows-tiles-sounds-x64-msvc"
          } else {
            "${{ github.workspace }}/build"
          }
          $exeName = if ("${{ matrix.tiles }}" -eq "true") { "cata_test-tiles" } else { "cata_test" }
          if ($IsWindows) {
            $exeName = "$exeName.exe"
          }
          $testBin = Join-Path $buildDir (Join-Path "tests" $exeName)
          if (-not (Test-Path $testBin)) {
            throw "Missing test executable: $testBin"
          }

          $testOpts = @(
            "--min-duration", "20",
            "--use-colour", "yes",
            "--rng-seed", "time",
            "--error-format=github-action"
          )
          if ($IsLinux) {
            $testOpts += "--gpu-backend=software"
          }
          $filters = @("[slow] ~starting_items", "~[slow] ~[.],starting_items")
          $jobs = @()
          for ($i = 0; $i -lt $filters.Count; ++$i) {
            $userDir = "test_user_dir_$($i + 1)"
            $jobs += Start-Job -Name "cata-test-$($i + 1)" -ScriptBlock {
              param($bin, $opts, $filter, $userDir)
              & $bin @opts "--user-dir=$userDir" $filter
              if ($LASTEXITCODE -ne 0) {
                throw "Test shard '$filter' exited with code $LASTEXITCODE"
              }
            } -ArgumentList $testBin, $testOpts, $filters[$i], $userDir
          }

          while ($jobs | Where-Object { $_.State -eq "Running" }) {
            Start-Sleep -Seconds 30
            $running = ($jobs | Where-Object { $_.State -eq "Running" }).Name -join ", "
            Write-Host "Still running: $running"
          }

          $failed = $false
          foreach ($job in $jobs) {
            Receive-Job $job -ErrorAction Continue
            if ($job.State -ne "Completed") {
              $failed = $true
              Write-Host "$($job.Name) failed with state $($job.State)"
            }
          }
          if ($failed) {
            throw "One or more test shards failed"
          }

      # Upload artifacts
      - name: Upload packaged build artifact
        if: inputs.upload-artifacts && matrix.upload-artifact == true
        uses: actions/upload-artifact@v4.6.0
        with:
          name: ${{ inputs.artifact-label != '' && format('{0}-{1}', matrix.artifact, inputs.artifact-label) || matrix.artifact }}
          path: ${{ runner.os == 'Windows' && format('cataclysmbn-{0}/', inputs.version-label) || format('cbn-{0}-{1}.{2}', matrix.artifact, inputs.version-label, matrix.ext) }}
          if-no-files-found: error

      - name: Upload to release
        if: inputs.upload-to-release
        run: |
          if [ "${{ inputs.version-label }}" = "experimental" ]; then
            SHA_SHORT=$(git rev-parse --short HEAD)
            COMMIT_SUBJECT=$(git log -1 --pretty=%s)
            TIMESTAMP=$(date -u "+%F %T")
            gh release upload experimental --clobber cbn-${{ matrix.artifact }}-${{ inputs.version-label }}.${{ matrix.ext }}
            gh release edit experimental --title "Experimental @ $TIMESTAMP ($SHA_SHORT)" --notes "Experimental build for commit $SHA_SHORT ($COMMIT_SUBJECT) on $TIMESTAMP"
          else
            gh release upload ${{ inputs.release-tag }} --clobber cbn-${{ matrix.artifact }}-${{ inputs.version-label }}.${{ matrix.ext }}
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash

      - name: Upload PDB to release (windows msvc)
        if: runner.os == 'Windows' && inputs.upload-to-release
        run: |
          if [ "${{ inputs.version-label }}" = "experimental" ]; then
            gh release upload experimental --clobber "cbn-${{ matrix.artifact }}-${{ inputs.version-label }}-pdb.zip"
          else
            gh release upload ${{ inputs.release-tag }} --clobber "cbn-${{ matrix.artifact }}-${{ inputs.version-label }}-pdb.zip"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
